name: Validate Manifest & Generate Stats

on:
  push:
    branches:
      - main
    paths:
      - 'MANIFEST.md'
      - 'images/**'
      - 'index.html'
  pull_request:
    branches:
      - main
    paths:
      - 'MANIFEST.md'
      - 'images/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate manifest and image inventory

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run validation script
        id: validate
        run: node .github/scripts/validate-manifest.js
        continue-on-error: true

      - name: Generate stats JSON
        id: stats
        run: node .github/scripts/generate-stats.js

      - name: Commit JSON if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/archive-stats.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update archive statistics [ci skip]"
            git push
          fi

      - name: Comment on PR with validation results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('.github/scripts/validation-report.md', 'utf-8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

      - name: Fail workflow if validation errors found
        if: steps.validate.outcome == 'failure'
        run: exit 1

      - name: Create issue for missing references
        if: failure() && github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('.github/scripts/validation-report.md', 'utf-8');
            
            // Only create if there are actual issues
            if (report.includes('❌')) {
              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '📋 Manifest Validation Alert',
                body: report,
                labels: ['archive-maintenance', 'documentation']
              });
            }
